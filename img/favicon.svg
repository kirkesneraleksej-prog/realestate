<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#080808"/>
  <!-- rear wheel -->
  <circle cx="16" cy="44" r="11" fill="none" stroke="#1B8FFF" stroke-width="3"/>
  <circle cx="16" cy="44" r="4" fill="#1B8FFF"/>
  <!-- front wheel -->
  <circle cx="48" cy="44" r="11" fill="none" stroke="#1B8FFF" stroke-width="3"/>
  <circle cx="48" cy="44" r="4" fill="#1B8FFF"/>
  <!-- frame body -->
  <rect x="20" y="22" width="22" height="14" rx="4" fill="#1B8FFF"/>
  <!-- lightning bolt -->
  <polygon points="32,25 28,33 32,33 29,41 36,31 32,31 35,25" fill="white"/>
  <!-- seat -->
  <rect x="22" y="17" width="14" height="7" rx="3" fill="#0d0d0d" stroke="#1B8FFF" stroke-width="1"/>
  <!-- front fork -->
  <line x1="41" y1="24" x2="46" y2="44" stroke="#1B8FFF" stroke-width="3" stroke-linecap="round"/>
  <!-- handlebar -->
  <line x1="38" y1="18" x2="38" y2="26" stroke="#888" stroke-width="3" stroke-linecap="round"/>
  <line x1="33" y1="18" x2="44" y2="18" stroke="#aaa" stroke-width="2.5" stroke-linecap="round"/>
  <!-- rear frame -->
  <line x1="20" y1="36" x2="16" y2="44" stroke="#1B8FFF" stroke-width="2.5" stroke-linecap="round"/>
</svg>
